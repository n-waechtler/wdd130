<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <meta name="description" content="White water rafting company setting people out on adventures and making memories. This page you will be able to contact the company and see where it is
      located.">
    <meta name="author" content="Nick Waechtler">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <div class="navigation">
            <img src="images/z-rapids-trees.jpg" alt="Rafting Logo" width="200">
            <nav>
                <ul class="navigation">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About Us</a></li>
                    <li><a href="trips.html">Trips</a></li>
                    <li><a href="contact.html">Contact Us</a></li>
                </ul>
            </nav>
        </div>
    </header>
    <main>
        <h1 class="contact-header">Rapids Rafting Adventures</h1>
        <section class="contact-info">
            <h2>Contact Us</h2>
            <p>123 Farrer St.</p>
            <p>Green River, Utah</p>
            <p>+1 999 999 9999</p>
            <p>info@rapidsraftingadventures.com</p>
        </section>
        <section class="contact-form">
            <div class="contact-space">
                <div id="map-container">
                    <iframe
                      src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d8772.15198926646!2d-110.15100624335378!3d38.982816714233536!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2sus!4v1775186712571!5m2!1sen!2sus"
                      width="600" height="450" allowfullscreen="" loading="lazy"
                      referrerpolicy="no-referrer-when-downgrade"></iframe>
                </div>
                <div id="contact-section">
                    <form id="contact-form">
                        <div class="form-item column2">
                            <label for="fullname">Full Name:</label>
                            <input type="text" id="fullname" name="fullname" required>
                        </div>
                        <div class="form-item column2">
                            <label for="useremail">Email:</label>
                            <input type="email" id="useremail" name="useremail" required>
                        </div>
                        <div class="field-container">
                            <label for="message-purpose">Message
                                Purpose</label>
                            <div class="radio-stack">
                                <input type="radio" id="general-inquiry" name="message-purpose">
                                <label for="general-inquiry">General
                                    Inquiry</label>
                                <input type="radio" id="reservation-question"
                                  name="message-purpose">
                                <label for="reservation-question">Reservation
                                    Question</label>
                                <input type="radio" id="website-suggestion" name="message-purpose">
                                <label for="website-suggestion">Website
                                    Suggestion</label>
                            </div>
                        </div>
                        <label for="feedback">Message</label>
                        <textarea id="feedback" name="feedback" rows="4"
                          placeholder="Type here"></textarea>
                        <div class="column1">
                            <input type="checkbox" id="subscribe" name="subscribe">
                            <label for="subscribe">Please Subscribe me to the monthly
                                newsletter</label>
                        </div>
                        <button type="Submit">Get in Touch!</button>
                    </form>
                </div>
            </div>
        </section>
        <section class="box">
            <h2 class="item">We Are Here To Serve You</h2>
            <figure class="employee-container">
                <div class="item">
                    <img src="images/employee2.jpg" alt="Snake Rapids" width="200">
                    <figcaption>Mike/Guide</figcaption>
                </div>
                <div class="item">
                    <img src="images/employee1.jpg" alt="Devils Lair" width="200">
                    <figcaption>Grace/Lead Guide</figcaption>
                </div>
                <div class="item">
                    <img src="images/employee3.jpg" alt="Blue Lagoon" width="200">
                    <figcaption>Scott/Guide</figcaption>
                </div>
            </figure>
        </section>
    </main>
    <footer>
        <div class="footer">
            <p>&copy; 2026 Rapids Nick Waechtler</p>
            <nav class="socialmedia">
                <a href="https://facebook.com">
                    <img src="images/facebook-square.jpg" alt="Facebook Icon" width="50">
                </a>
                <a href="https://linkedin.com">
                    <img src="images/linkedin-square.jpg" alt="LinkedIn Icon" width="50">
                </a>
                <a href="https://instagram.com">
                    <img src="images/instagram-square.jpg" alt="Instagram Icon" width="50">
                </a>
            </nav>
        </div>
    </footer>
</body>

</html>
