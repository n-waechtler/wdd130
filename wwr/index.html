<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page Rapids Rafting Adventures</title>
    <meta name="description"
      content="Base camp. White water rafting company setting people out on adventures and making memories. ">
    <meta name="author" content="Nick Waechtler">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <div class="navigation">
            <img src="images/z-rapids-trees.jpg" alt="Rafting Logo" width="200">
            <nav>
                <ul class="navigation">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About Us</a></li>
                    <li><a href="trips.html">Trips</a></li>
                    <li><a href="contact.html">Contact Us</a></li>
                </ul>
            </nav>
        </div>
    </header>
    <main>
        <div class="hero">
            <img src="images/rafting-home.jpg" alt="Rafting Group">
            <h1>Rapids Rafting Adventures</h1>
        </div>
        <div class="activities">
            <figure>
                <img src="images/rivers.jpg" alt="Rivers" width="200">
                <figcaption>Rivers</figcaption>
            </figure>
            <figure>
                <img src="images/camping.jpg" alt="Camping" width="200">
                <figcaption>Camping</figcaption>
            </figure>
            <figure>
                <img src="images/rapids.jpg" alt="Rapids" width="200">
                <figcaption>Rapids</figcaption>
            </figure>
        </div>
        <div class="mission">
            <img src="images/mission.jpg" alt="Mission">
            <form class="subscribe">
                <fieldset>
                    <legend>Newsletter Subscription</legend>
                    <div class="form-item">
                        <label for="fullname">Full Name:</label>
                        <input type="text" id="fullname" name="fullname" required>
                    </div>
                    <div class="form-item">
                        <label for="useremail">Email:</label>
                        <input type="email" id="useremail" name="useremail" required>
                    </div>
                </fieldset>
                <button class="button2" type="Submit">Subscribe!</button>
            </form>
        </div>
    </main>
    <footer>
        <div class="footer">
            <p>&copy; 2026 Rapids Nick Waechtler</p>
            <p>
                <a href="https://jigsaw.w3.org/css-validator/check/referer">
                    <img style="border:0;width:88px;height:31px"
                      src="https://jigsaw.w3.org/css-validator/images/vcss" alt="Valid CSS!" />
                </a>
            </p>
            <nav class="socialmedia">
                <a href="https://facebook.com">
                    <img src="images/facebook-square.jpg" alt="Facebook Icon" width="50">
                </a>
                <a href="https://linkedin.com">
                    <img src="images/linkedin-square.jpg" alt="LinkedIn Icon" width="50">
                </a>
                <a href="https://instagram.com">
                    <img src="images/instagram-square.jpg" alt="Instagram Icon" width="50">
                </a>
            </nav>
        </div>
    </footer>
</body>

</html>
